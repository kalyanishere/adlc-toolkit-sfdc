# Preset: SFDC Core (Apex + LWC + Flow + SOQL + Permissions + Deploy).
# Copy to .adlc/config.yml; /init fills the placeholders.

project:
  name: "<Project Display Name>"
  shortname: "XYZ"
  preset: sfdc-core

salesforce:
  app_prefix: "XYZ"
  api_version: "62.0"
  org_alias: "<repo-basename>"
  package_directories:
    - "force-app"
  agentforce_variant: ""
  industries: []
  features:
    ui_bundles: false
  coverage:
    mode: brownfield
    org_floor: 75
    org_target: 80
    class_floor: 75
    diff_only: false
  smoke_tests: []

stack:
  languages: [apex, javascript]
  frontends: [lwc]
  backends: [salesforce-platform]
  databases: [salesforce-soql]
  ci: github-actions

repos:
  sfdc:
    primary: true

merge_order:
  - sfdc

orgs:
  sandbox: "<repo-basename>"

playwright_specs: "tests/e2e"
