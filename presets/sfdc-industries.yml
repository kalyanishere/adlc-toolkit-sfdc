# Preset: SFDC Industries (Core + Data Cloud + Agentforce + OmniStudio + CME).
# Copy to .adlc/config.yml; /init fills the placeholders. Trim `industries:`
# to what's actually in scope — leaving unused flags on produces noisy review findings.

project:
  name: "<Project Display Name>"
  shortname: "XYZ"
  preset: sfdc-industries

salesforce:
  app_prefix: "XYZ"
  api_version: "66.0"
  org_alias: "<repo-basename>"
  package_directories:
    - "force-app"
  agentforce_variant: "Employee"   # "Employee" | "Service"
  industries:
    - datacloud
    - agentforce
    - omnistudio
    - cme
  # Industries-tier baseline. Trim per project — see .adlc/context/sf-clouds.md.
  clouds:
    - platform
    - sales-cloud
    - service-cloud
    - experience-cloud
    - data-cloud
    - agentforce
    - omnistudio
  india_context: true
  features:
    ui_bundles: false
  coverage:
    mode: brownfield
    org_floor: 75
    org_target: 80
    class_floor: 75
    diff_only: false
  smoke_tests: []

stack:
  languages: [apex, javascript]
  frontends: [lwc]
  backends: [salesforce-platform]
  databases: [salesforce-soql, datacloud]
  ci: github-actions

repos:
  sfdc:
    primary: true

merge_order:
  - sfdc

orgs:
  sandbox: "<repo-basename>"

# Industry domains served. Trim per project — see .adlc/context/industry-domains.md.
# Examples for an India BFSI build: [banking-retail, wealth-management, payments, kyc-aml]
# For a CG/FMCG build: [cpg-fmcg, partner-distributor, field-execution]
# For Health: [provider-hospital, payer]
industry_domains: []

audit:
  enabled: true
  fail_on: "CRITICAL,HIGH"
  scope: diff
  skip_paths: []
  report_dir: ".adlc/runtime/audit"

agentforce_test_specs: "force-app/main/default/agentTests"
playwright_specs: "tests/e2e"
