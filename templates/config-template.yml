# .adlc/config.yml — ADLC Salesforce project configuration
#
# This file lives in every Salesforce repo that originates REQs. "Primary" is
# per-REQ, not a fixed designation: whichever repo you invoke /proceed from
# becomes the primary for that REQ, so every repo that can host REQs needs its
# own `.adlc/` (from /init) and its own config.yml.
#
# Single-repo SF projects (the common case — one DX project) can leave the
# `repos:` block with a single entry. All ADLC skills fall back to legacy
# single-repo behavior when only one entry is declared.
#
# ---------------------------------------------------------------------------
# QUICKSTART: copy a preset
# ---------------------------------------------------------------------------
# The fastest way to fill this in is to start from a preset that matches your
# stack, then replace the placeholder values.
#
#   cp ~/.claude/skills/presets/sfdc-core.yml .adlc/config.yml
#
# Available presets (see ~/.claude/skills/presets/):
#   - sfdc-core.yml        — Apex + LWC + Flow + SOQL + Permissions + Deploy
#   - sfdc-industries.yml  — sfdc-core + Data Cloud, Agentforce, OmniStudio,
#                            Industries CME EPC, Vlocity build/deploy
#
# If no preset matches, fill out the sections below from scratch.

# ---------------------------------------------------------------------------
# project: Display name and (optional) preset reference.
# ---------------------------------------------------------------------------
# `name` is shown in skill output and PR/commit metadata.
# `preset` is informational only: it records which preset (if any) this config
# was seeded from. Skills don't read it; it's a hint for `/template-drift`.

project:
  name: "My Salesforce Project"
  # preset: sfdc-core

# ---------------------------------------------------------------------------
# salesforce: Salesforce-specific identity and policy values.
# ---------------------------------------------------------------------------
# These are the values salesforce-rules.md depends on at runtime. Skills read
# them when generating Apex, permission sets, deploy commands, etc.
#
#   app_prefix         — 3–8 character PascalCase identifier used in permission
#                        set naming: [AppPrefix]_[Component]_[AccessLevel].
#                        Example: SalesApp -> SalesApp_Opportunity_Read
#   api_version        — Salesforce API version floor. salesforce-rules.md
#                        mandates 66.0+ for any Agentforce/AI metadata.
#   org_alias          — Default sf CLI alias (sf org list). Skills will
#                        target this org for sf data, sf agent, sf data360
#                        invocations unless overridden.
#   package_directories — Repo-relative paths that hold metadata. Mirrors
#                        sfdx-project.json's packageDirectories; used by
#                        /architect to scope the change set.
#   agentforce_variant — Employee | Service. Determines deploy gate, persona
#                        shape, and whether a dedicated Einstein Agent User +
#                        system permission set is required. Omit when
#                        Agentforce is not in scope.
#   industries         — Opt-in flags for advanced surface areas. Skills
#                        branch on this to wire (or skip) the relevant
#                        sf-skills rubrics.

salesforce:
  app_prefix: "<AppPrefix>"          # 3–8 chars, PascalCase
  api_version: "66.0"                # 66.0+ required for Agentforce
  org_alias: "<org-alias>"           # default sf CLI org alias
  package_directories:
    - "force-app"
  agentforce_variant: ""             # "Employee" | "Service" | "" (not used)
  industries: []                     # any subset of: [datacloud, agentforce, omnistudio, cme]

# ---------------------------------------------------------------------------
# stack: Tech stack declaration. Drives conditional skill behavior.
# ---------------------------------------------------------------------------
# Recognized values:
#   languages:  apex | javascript | typescript
#   frontends:  lwc | aura
#   backends:   salesforce-platform | external-rest
#   databases:  salesforce-soql | datacloud
#   ci:         github-actions | gitlab-ci | circleci | jenkins | none

stack:
  languages: [apex, javascript]
  frontends: [lwc]
  backends: [salesforce-platform]
  databases: [salesforce-soql]
  ci: github-actions

# ---------------------------------------------------------------------------
# repos: This repo plus every sibling it might coordinate with.
# ---------------------------------------------------------------------------
# The key is a short stable id (used in task frontmatter as `repo: <id>`).
# The entry for THIS repo has `primary: true` and no `path` (path is implicit).
# Sibling entries declare a `path:` relative to this repo's root (or absolute).

repos:
  # The common SF case: a single DX project repo.
  sfdc:
    primary: true
  # Example sibling (an external integration repo, e.g. MuleSoft, Heroku app)
  # integration:
  #   path: ../integration

# ---------------------------------------------------------------------------
# merge_order: Order Phase 8 merges PRs across touched repos.
# ---------------------------------------------------------------------------
# List touched repo ids in the order they should merge. For a single-repo SF
# project this is just [sfdc]. If you have a sibling integration repo, merge
# the contract-providing repo first.

merge_order:
  - sfdc

# ---------------------------------------------------------------------------
# orgs: sf CLI deploy targets for /canary and /wrapup.
# ---------------------------------------------------------------------------
# Maps an environment label to an sf CLI org alias. /canary promotes a change
# along this list (sandbox -> staging -> prod), running `sf project deploy
# validate` then `sf project deploy start`. The "prod" entry is gated by an
# ask-prompt in .claude/settings.json; never auto-approved.
#
# `agentforce_test_specs` is the path to your sf agent test specs (used by
# /canary's Agentforce smoke gate). Omit when Agentforce is not in scope.

orgs:
  sandbox: "<sandbox-alias>"
  staging: "<staging-alias>"
  prod:    "<prod-alias>"

agentforce_test_specs: ""           # e.g., "force-app/main/default/agentTests"
